# ═══════════════════════════════════════════════════════════════
# Maneuver Driving School — nginx.conf
# For VPS/cloud hosting (DigitalOcean, Linode, AWS EC2, etc.)
# Place in: /etc/nginx/sites-available/maneuverdrivingschool.ca
# Enable: ln -s /etc/nginx/sites-available/maneuverdrivingschool.ca /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name maneuverdrivingschool.ca www.maneuverdrivingschool.ca;
    return 301 https://maneuverdrivingschool.ca$request_uri;
}

# Redirect www → non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.maneuverdrivingschool.ca;

    ssl_certificate     /etc/letsencrypt/live/maneuverdrivingschool.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maneuverdrivingschool.ca/privkey.pem;

    return 301 https://maneuverdrivingschool.ca$request_uri;
}

# Main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maneuverdrivingschool.ca;

    root /var/www/maneuverdrivingschool.ca;
    index index.html;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/maneuverdrivingschool.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maneuverdrivingschool.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header X-XSS-Protection          "1; mode=block"               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;
    # Enable HSTS after confirming SSL works:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/ld+json image/svg+xml
               font/woff2 font/woff application/xml;

    # ── Browser Caching ───────────────────────────────────────
    location ~* \.(webp|png|jpg|jpeg|ico|svg)$ {
        expires 3M;
        add_header Cache-Control "public, max-age=7776000, immutable";
        access_log off;
    }

    location ~* \.(woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 1w;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        allow all;
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        expires 1d;
    }

    # ── SPA routing — serve index.html for all paths ─────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block hidden files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/maneuverdrivingschool.access.log;
    error_log  /var/log/nginx/maneuverdrivingschool.error.log;
}
